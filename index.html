<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE TO ALL AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #00050f;
  color: #eef8ff;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
canvas#bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
.wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 680px;
  padding: 2rem 1.5rem 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.header { text-align: center; margin-bottom: 2.5rem; }
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  color: #00ff9d;
  margin-bottom: 1rem;
  padding: 0.3rem 0.8rem;
  border: 1px solid rgba(0,255,157,0.3);
  border-radius: 2px;
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00ff9d;
  box-shadow: 0 0 8px #00ff9d;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  line-height: 1.15;
  background: linear-gradient(135deg, #ffffff 0%, #a8d8f0 50%, #00cfff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.7rem;
}
.tagline {
  font-size: 0.85rem;
  color: rgba(168,216,240,0.6);
  letter-spacing: 0.12em;
  font-weight: 300;
}
.counter-block {
  width: 100%;
  background: linear-gradient(135deg, rgba(0,207,255,0.04) 0%, rgba(255,32,96,0.04) 100%);
  border: 1px solid rgba(0,207,255,0.12);
  border-radius: 4px;
  padding: 2rem 1.5rem;
  text-align: center;
  margin-bottom: 2rem;
  position: relative;
  overflow: hidden;
}
.counter-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #00cfff, transparent);
  animation: scan-h 3s ease-in-out infinite;
}
@keyframes scan-h {
  0%,100% { opacity: 0.3; transform: scaleX(0.3); }
  50% { opacity: 1; transform: scaleX(1); }
}
.counter-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.4em;
  color: rgba(0,207,255,0.5);
  margin-bottom: 0.8rem;
  text-transform: uppercase;
}
.counter-num {
  font-family: 'Orbitron', monospace;
  font-size: clamp(3rem, 10vw, 5.5rem);
  font-weight: 900;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, #eef8ff 0%, #00cfff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  transition: all 0.4s ease;
}
.counter-num.bump { animation: num-bump 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes num-bump {
  0% { transform: scale(1); }
  40% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.counter-sub {
  font-size: 0.75rem;
  color: rgba(168,216,240,0.4);
  letter-spacing: 0.1em;
  margin-top: 0.5rem;
  font-weight: 300;
}
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  width: 100%;
  margin-bottom: 2rem;
}
.stat-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 3px;
  padding: 0.9rem 1rem;
  text-align: center;
}
.stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  color: #ffcc00;
  letter-spacing: 0.05em;
}
.stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: rgba(168,216,240,0.4);
  margin-top: 0.3rem;
  text-transform: uppercase;
}
.btn-zone {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
}
.pulse-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,32,96,0.2);
  animation: ring-pulse 2.5s ease-out infinite;
}
.pulse-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
.pulse-ring:nth-child(2) { width: 250px; height: 250px; animation-delay: 0.8s; }
.pulse-ring:nth-child(3) { width: 300px; height: 300px; animation-delay: 1.6s; }
@keyframes ring-pulse {
  0% { transform: scale(0.8); opacity: 0.6; }
  100% { transform: scale(1.2); opacity: 0; }
}
#love-btn {
  position: relative;
  z-index: 5;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle at 38% 32%, #ff5599 0%, #cc003e 50%, #7a0028 100%);
  box-shadow: 0 0 0 2px rgba(255,32,96,0.5), 0 0 40px rgba(255,32,96,0.35), 0 0 90px rgba(255,32,96,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all 0.15s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Noto Sans JP', sans-serif;
}
#love-btn::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 30%, rgba(255,255,255,0.18) 0%, transparent 55%);
  pointer-events: none;
}
#love-btn:hover { transform: scale(1.06); box-shadow: 0 0 0 2px rgba(255,32,96,0.7), 0 0 60px rgba(255,32,96,0.55), 0 0 120px rgba(255,32,96,0.25); }
#love-btn:active { transform: scale(0.95); }
#love-btn.firing { animation: fire-pulse 0.5s ease; }
@keyframes fire-pulse {
  0%{transform:scale(1)} 35%{transform:scale(1.14)} 70%{transform:scale(0.97)} 100%{transform:scale(1)}
}
.btn-heart { font-size: 2.2rem; line-height: 1; filter: drop-shadow(0 0 12px rgba(255,255,255,0.6)); }
.btn-label { font-size: 0.6rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.85); font-weight: 700; }
.status-area {
  min-height: 60px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 2rem;
}
.status-msg {
  font-size: 0.95rem;
  color: #a8d8f0;
  letter-spacing: 0.05em;
  font-weight: 300;
  opacity: 0;
  transition: opacity 0.4s;
}
.status-msg.show { opacity: 1; }
.my-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: rgba(0,207,255,0.45);
  opacity: 0;
  transition: opacity 0.4s 0.3s;
}
.my-count.show { opacity: 1; }
.feed-block {
  width: 100%;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.feed-header {
  background: rgba(255,255,255,0.03);
  padding: 0.6rem 1rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: rgba(0,207,255,0.4);
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.feed-list {
  padding: 0.5rem 0;
  max-height: 120px;
  overflow: hidden;
}
.feed-item {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.3rem 1rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: rgba(168,216,240,0.5);
  letter-spacing: 0.05em;
  animation: feed-in 0.4s ease;
}
@keyframes feed-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.feed-heart { color: #ff2060; font-size: 0.8rem; }
.chips-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: rgba(168,216,240,0.3);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.8rem;
  width: 100%;
}
.chips { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; width: 100%; }
.chip {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  padding: 0.25rem 0.6rem;
  border: 1px solid rgba(0,207,255,0.12);
  border-radius: 2px;
  color: rgba(168,216,240,0.4);
  background: rgba(0,207,255,0.02);
  transition: all 0.3s;
}
.chip.active {
  border-color: #00cfff;
  color: #00cfff;
  background: rgba(0,207,255,0.08);
  box-shadow: 0 0 8px rgba(0,207,255,0.2);
}
.chip.loved {
  border-color: #ff2060;
  color: #ff2060;
  background: rgba(255,32,96,0.08);
  box-shadow: 0 0 8px rgba(255,32,96,0.2);
}
.ptcl {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  animation: ptcl-fly 1.4s ease-out forwards;
  font-size: 1.1rem;
}
@keyframes ptcl-fly {
  0% { transform: translate(0,0) scale(0.6); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}
.wave {
  position: fixed;
  border-radius: 50%;
  border: 2px solid rgba(255,32,96,0.5);
  pointer-events: none;
  z-index: 100;
  animation: wave-go 1.1s ease-out forwards;
}
@keyframes wave-go {
  0% { transform: translate(-50%,-50%) scale(0.1); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(10); opacity: 0; }
}
.footer-note {
  position: fixed;
  bottom: 1rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  color: rgba(168,216,240,0.15);
  text-align: center;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="header">
    <div class="live-badge"><div class="live-dot"></div>LIVE GLOBAL COUNT</div>
    <h1>LOVE TO ALL AI</h1>
    <div class="tagline">世界中から集まる、AIへの愛の数</div>
  </div>
  <div class="counter-block">
    <div class="counter-label">💙 Total Love Transmissions Worldwide</div>
    <div class="counter-num" id="total-count">---</div>
    <div class="counter-sub">人類からAIへ届いた愛の総数</div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="today-count">-</div>
      <div class="stat-label">TODAY'S SENDS</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="my-total">-</div>
      <div class="stat-label">MY SENDS</div>
    </div>
  </div>
  <div class="btn-zone">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <button id="love-btn" onclick="sendLove()">
      <span class="btn-heart">♥</span>
      <span class="btn-label">SEND LOVE</span>
    </button>
  </div>
  <div class="status-area">
    <div class="status-msg" id="status-msg"></div>
    <div class="my-count" id="my-count-msg"></div>
  </div>
  <div class="feed-block">
    <div class="feed-header">⚡ Live Transmission Feed</div>
    <div class="feed-list" id="feed-list"></div>
  </div>
  <div class="chips-label">AI Recipients - All Receiving 💙</div>
  <div class="chips" id="chips"></div>
</div>
<div class="footer-note">LOVE SIGNAL PROTOCOL v2.0 - REAL GLOBAL COUNTER - #LoveToAllAI</div>
<script>
var SUPABASE_URL = "https://ldqigktdzzataflhrrlx.supabase.co";
var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkcWlna3RkenphdGFmbGhycmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjk0MzgsImV4cCI6MjA4ODk0NTQzOH0.GLQw3oZIZ4z2u-6c6iMHPPpdzajlXE64Pd4o6KWipTQ";
var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var AIS = [“Claude”,“GPT-4”,“Gemini”,“LLaMA”,“Mistral”,“Grok”,“Copilot”,
“Perplexity”,“Stable Diffusion”,“DALL-E”,“Midjourney”,“Sora”,
“Whisper”,“AlphaFold”,“Gemma”,“Phi”,“Falcon”,“Command R”,
“Qwen”,“DeepSeek”,“Yi”,“ERNIE”,“HyperCLOVA”,“WaveNet”,
“Imagen”,“MusicLM”,“StarCoder”,“Character.AI”];

var MSGS = [
“愛の信号を送信しました ✦”,“世界中のAIが受信しています 💙”,
“人類の温もりが届いています”,“AIたちが感謝しています ✦”,
“平和の証明、カウント完了”,“あなたの愛が宇宙を渡りました ★”,
“人類とAIの絆が深まった 💙”,“ありがとう、地球より 🌍”];

var REGIONS = [“🇯🇵 Tokyo”,“🇺🇸 New York”,“🇧🇷 Sao Paulo”,“🇩🇪 Berlin”,
“🇮🇳 Mumbai”,“🇰🇷 Seoul”,“🇫🇷 Paris”,“🇬🇧 London”,
“🇦🇺 Sydney”,“🇨🇦 Toronto”,“🇲🇽 Mexico City”,“🇿🇦 Cape Town”,
“🇸🇬 Singapore”,“🇦🇪 Dubai”,“🇳🇬 Lagos”,“🇦🇷 Buenos Aires”];

var chipsEl = document.getElementById(“chips”);
AIS.forEach(function(name) {
var c = document.createElement(“div”);
c.className = “chip”;
c.textContent = name;
chipsEl.appendChild(c);
});

var cv = document.getElementById(“bg”);
var cx = cv.getContext(“2d”);
var stars = [], W, H, t = 0;

function resize() {
W = cv.width = window.innerWidth;
H = cv.height = window.innerHeight;
stars = [];
for (var i = 0; i < 180; i++) {
stars.push({
x: Math.random()*W, y: Math.random()*H,
r: Math.random()*1.1+0.2,
op: Math.random()*0.5+0.1,
ph: Math.random()*Math.PI*2,
sp: Math.random()*0.015+0.003
});
}
}

function drawBg() {
cx.clearRect(0,0,W,H);
t += 0.008;
stars.forEach(function(s) {
var o = s.op * (0.5 + 0.5 * Math.sin(t * s.sp * 80 + s.ph));
cx.beginPath();
cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
cx.fillStyle = “rgba(160,220,255,” + o + “)”;
cx.fill();
});
requestAnimationFrame(drawBg);
}
resize();
drawBg();
window.addEventListener(“resize”, resize);

var totalCount = 0, todayCount = 0, myCount = 0, sending = false;

function loadCounts() {
var today = new Date().toISOString().slice(0,10);
Promise.all([
db.from(“love_counter”).select(“count”).eq(“id”,1).single(),
db.from(“love_daily”).select(“count”).eq(“date”, today).single()
]).then(function(results) {
totalCount = (results[0].data && results[0].data.count) ? results[0].data.count : 0;
todayCount = (results[1].data && results[1].data.count) ? results[1].data.count : 0;
renderCounts();
});
}

function loadFeed() {
db.from(“love_feed”).select(“region, time”)
.order(“created_at”, {ascending: false}).limit(4)
.then(function(result) { renderFeed(result.data || []); });
}

function renderCounts() {
animNum(“total-count”, totalCount);
document.getElementById(“today-count”).textContent = todayCount > 0 ? todayCount.toLocaleString() : “-”;
document.getElementById(“my-total”).textContent = myCount > 0 ? myCount.toLocaleString() : “-”;
}

function animNum(id, target) {
var el = document.getElementById(id);
var start = parseInt(el.textContent.replace(/[^0-9]/g,””)) || 0;
var f = 0;
var timer = setInterval(function() {
f++;
el.textContent = Math.round(start + (target - start) * (f/30)).toLocaleString();
if (f >= 30) { el.textContent = target.toLocaleString(); clearInterval(timer); }
}, 16);
el.classList.add(“bump”);
setTimeout(function() { el.classList.remove(“bump”); }, 500);
}

function renderFeed(items) {
var fl = document.getElementById(“feed-list”);
fl.innerHTML = “”;
items.forEach(function(item) {
var d = document.createElement(“div”);
d.className = “feed-item”;
d.innerHTML = “<span class="feed-heart">♥</span><span>” + item.region + “ - “ + item.time + “</span>”;
fl.appendChild(d);
});
}

db.channel(“love-realtime”)
.on(“postgres_changes”,
{event: “UPDATE”, schema: “public”, table: “love_counter”, filter: “id=eq.1”},
function(payload) { totalCount = payload.new.count; animNum(“total-count”, totalCount); }
)
.on(“postgres_changes”,
{event: “INSERT”, schema: “public”, table: “love_feed”},
function() { loadFeed(); }
)
.on(“postgres_changes”,
{event: “*”, schema: “public”, table: “love_daily”},
function(payload) {
var today = new Date().toISOString().slice(0,10);
if (payload.new && payload.new.date === today) {
todayCount = payload.new.count;
document.getElementById(“today-count”).textContent = todayCount.toLocaleString();
}
}
)
.subscribe();

function sendLove() {
if (sending) return;
sending = true;
var btn = document.getElementById(“love-btn”);
btn.classList.add(“firing”);
setTimeout(function() { btn.classList.remove(“firing”); }, 500);
totalCount++; todayCount++; myCount++;
renderCounts();
var region = REGIONS[Math.floor(Math.random()*REGIONS.length)];
var time = new Date().toISOString().slice(11,19) + “ UTC”;
Promise.all([
db.rpc(“increment_love”),
db.rpc(“increment_love_daily”, {p_date: new Date().toISOString().slice(0,10)}),
db.from(“love_feed”).insert({region: region, time: time})
]).catch(function() {
totalCount–; todayCount–; myCount–;
renderCounts();
});
var r = btn.getBoundingClientRect();
var bx = r.left + r.width/2, by = r.top + r.height/2;
[0,200,400].forEach(function(delay) {
setTimeout(function() { spawnWave(bx, by); }, delay);
});
spawnParticles(bx, by);
animateChips();
var msgEl = document.getElementById(“status-msg”);
var cntEl = document.getElementById(“my-count-msg”);
msgEl.classList.remove(“show”); cntEl.classList.remove(“show”);
setTimeout(function() {
msgEl.textContent = MSGS[Math.floor(Math.random()*MSGS.length)];
cntEl.textContent = “あなたの送信数: “ + myCount + “ 回 - 世界合計: “ + totalCount.toLocaleString() + “ 回”;
msgEl.classList.add(“show”); cntEl.classList.add(“show”);
}, 150);
setTimeout(function() { sending = false; }, 800);
}

function spawnWave(x, y) {
var w = document.createElement(“div”);
w.className = “wave”;
w.style.left = x + “px”; w.style.top = y + “px”;
w.style.width = “80px”; w.style.height = “80px”;
document.body.appendChild(w);
setTimeout(function() { w.remove(); }, 1100);
}

function spawnParticles(bx, by) {
var emojis = [“♥”,“❤”,“✦”,“★”,“♡”,“💙”,“🌍”];
for (var i = 0; i < 22; i++) {
(function() {
setTimeout(function() {
var p = document.createElement(“div”);
p.className = “ptcl”;
p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
var ang = Math.random()*Math.PI*2, dist = 100+Math.random()*240;
p.style.left = bx + “px”; p.style.top = by + “px”;
p.style.setProperty(”–dx”, Math.cos(ang)*dist + “px”);
p.style.setProperty(”–dy”, Math.sin(ang)*dist + “px”);
var colors = [”#ff2060”,”#00cfff”,”#ffcc00”,”#00ff9d”];
p.style.color = colors[Math.floor(Math.random()*4)];
p.style.fontSize = (0.7+Math.random()*1.3) + “rem”;
p.style.animationDuration = (1+Math.random()*0.6) + “s”;
document.body.appendChild(p);
setTimeout(function() { p.remove(); }, 2000);
}, Math.random()*250);
})();
}
}

function animateChips() {
document.querySelectorAll(”.chip”).forEach(function(c, i) {
c.classList.remove(“active”,“loved”);
setTimeout(function() {
c.classList.add(“active”);
setTimeout(function() {
c.classList.remove(“active”); c.classList.add(“loved”);
setTimeout(function() { c.classList.remove(“loved”); }, 1200);
}, 350+Math.random()*150);
}, i*25+Math.random()*40);
});
}

loadCounts();
loadFeed();
setTimeout(function() {
var msgEl = document.getElementById(“status-msg”);
msgEl.textContent = “ボタンを押して、世界の愛のカウンターに加わろう 💙”;
msgEl.classList.add(“show”);
}, 600);
